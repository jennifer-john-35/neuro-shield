<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NEURO-SHIELD — {% block title %}Dashboard{% endblock %}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#0f1425;--bg3:#161c30;
  --panel:#1a2040;--border:#2a3560;
  --text:#e8ecff;--text2:#8b9ec7;--text3:#5a6a9a;
  --green:#00ff88;--green2:#00cc6a;--green-dim:#003322;
  --red:#ff4060;--amber:#ffaa00;--blue:#4488ff;--cyan:#00ddff;--purple:#aa55ff;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:var(--blue);text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:6px;height:52px;position:sticky;top:0;z-index:100}
.nav-logo{font-weight:700;font-size:15px;color:var(--green);margin-right:16px;white-space:nowrap}
.nav-logo span{color:var(--text2);font-weight:400}
.nav-tab{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);background:transparent;border:none;transition:all .15s;text-decoration:none;display:inline-block}
.nav-tab:hover{color:var(--text);background:var(--bg3)}
.nav-tab.active{background:var(--panel);color:var(--green);border:1px solid var(--border)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}

/* LAYOUT */
.page{padding:20px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:14px}
.flex1{flex:1;min-width:0}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}

/* METRICS */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-val{font-size:28px;font-weight:700;font-family:monospace}
.metric-label{font-size:11px;color:var(--text3);margin-top:4px}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green2)}
.btn-red{background:rgba(255,64,96,.12);color:var(--red);border:1px solid var(--red)}
.btn-amber{background:rgba(255,170,0,.12);color:var(--amber);border:1px solid var(--amber)}
.btn-blue{background:rgba(68,136,255,.12);color:var(--blue);border:1px solid var(--blue)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ALERTS */
.alert-item{border-radius:10px;padding:10px 14px;margin-bottom:8px;border-left:3px solid var(--border);animation:slideIn .3s ease}
.alert-crash{background:rgba(255,64,96,.06);border-left-color:var(--red)}
.alert-warn{background:rgba(255,170,0,.05);border-left-color:var(--amber)}
.alert-ok{background:rgba(0,255,136,.05);border-left-color:var(--green)}
.alert-type{font-weight:800;font-size:13px}
.alert-loc{font-size:12px;color:var(--text2);margin-top:3px}
.alert-time{font-size:10px;color:var(--text3);font-family:monospace}

/* PROGRESS BAR */
.progress-wrap{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}

/* SPOT LIST */
.spot-item{border-radius:8px;padding:9px 12px;margin-bottom:6px;background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--border);cursor:pointer;transition:all .15s}
.spot-item:hover{border-color:var(--border2);background:var(--panel)}
.spot-item.selected{background:var(--panel);border-color:currentColor}
.spot-meta{display:flex;gap:12px;font-size:11px;color:var(--text3);margin-top:3px}

/* BADGE */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}

/* MAP */
.map-wrap{border-radius:10px;border:1px solid var(--border);overflow:hidden;background:#0d1420}

/* LEAFLET DARK */
.leaflet-popup-content-wrapper{background:#1a2040!important;border:1px solid #2a3560!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important;color:#e8ecff!important}
.leaflet-popup-tip{background:#1a2040!important}
.leaflet-popup-close-button{color:#8b9ec7!important}

/* LSTM BARS */
.lstm-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.lstm-bar-label{font-size:10px;font-family:monospace;min-width:82px}
.lstm-bar-track{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative}
.lstm-bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:5px;transition:width .25s ease}
.lstm-bar-pct{font-size:10px;font-family:monospace;min-width:36px;text-align:right}

/* IMU GRID */
.imu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.imu-cell{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.imu-val{font-size:20px;font-weight:700;font-family:monospace}
.imu-label{font-size:10px;color:var(--text3)}

/* DETAIL ROW */
.detail-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.detail-key{color:var(--text3);font-size:12px;min-width:110px}
.detail-val{font-size:12px}
</style>
{% block head %}{% endblock %}
</head>
<body>
<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">NEURO<span>SHIELD</span></div>
  <a href="/"        class="nav-tab {% if request.path=='/' %}active{% endif %}">🏠 Overview</a>
  <a href="/hospital"class="nav-tab {% if request.path=='/hospital' %}active{% endif %}">🏥 Hospital</a>
  <a href="/greyspot"class="nav-tab {% if request.path=='/greyspot' %}active{% endif %}">🗺 Grey-Spot</a>
  <a href="/sentinel"class="nav-tab {% if request.path=='/sentinel' %}active{% endif %}">📡 Sentinel</a>
  <a href="/medical" class="nav-tab {% if request.path=='/medical' %}active{% endif %}">🪪 Medical ID</a>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <div class="live-dot" id="live-dot"></div>
    <span style="font-size:11px;color:var(--text3)" id="live-label">Connecting...</span>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- SSE + shared JS -->
<script>
const es = new EventSource('/events');
es.addEventListener('connected', ()=>{
  document.getElementById('live-dot').style.background='var(--green)';
  document.getElementById('live-label').textContent='LIVE';
});
es.onerror = ()=>{
  document.getElementById('live-dot').style.background='var(--red)';
  document.getElementById('live-label').textContent='Offline';
};
{% block sse_handlers %}{% endblock %}

async function apiPost(url, data){
  try{ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return await r.json(); }
  catch(e){ return null; }
}
async function apiGet(url){
  try{ const r=await fetch(url); return await r.json(); }
  catch(e){ return null; }
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
